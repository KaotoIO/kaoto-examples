      steps:
        - unmarshal:
            id: unmarshal-3798
            description: CSV - map
            csv:
              trim: true
              useMaps: true
        - split:
            id: split-2544
            description: Split by patient
            csimple:
              expression: ${body}
        - log: ${body}
